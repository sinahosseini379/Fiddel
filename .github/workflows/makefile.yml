name: Makefile CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libncurses5-dev unzip

      - name: Build package
        run: make -C luci-app-fiddel

      - name: Run checks (optional)
        run: |
          if [ -f luci-app-fiddel/Makefile ]; then
            make -C luci-app-fiddel check || echo "No check target defined"
          else
            echo "Makefile not found, skipping checks"
          fi
